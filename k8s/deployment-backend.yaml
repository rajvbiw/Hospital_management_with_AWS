apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  namespace: hospital-system
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: hospital_backend:latest
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: hospital-config
            - secretRef:
                name: hospital-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: hospital-system
  labels:
    app: backend
spec:
  ports:
    - port: 5000
      targetPort: 5000
      protocol: TCP
  selector:
    app: backend

