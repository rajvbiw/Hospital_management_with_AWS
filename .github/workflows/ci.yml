name: CI/CD Pipeline — CareSuite Hospital PMS

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  REGISTRY: docker.io
  BACKEND_IMAGE: ${{ secrets.DOCKER_HUB_USERNAME }}/hospital-pms-backend
  FRONTEND_IMAGE: ${{ secrets.DOCKER_HUB_USERNAME }}/hospital-pms-frontend

jobs:
  # ────────────────────────────────────────────────────────────
  # JOB 1: Lint — ESLint on frontend TypeScript source
  # ────────────────────────────────────────────────────────────
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Run TypeScript check
        run: npx tsc --noEmit
        working-directory: frontend

      - name: Install ESLint (if not in devDeps)
        run: |
          if ! npx eslint --version 2>/dev/null; then
            npm install --save-dev eslint @typescript-eslint/parser @typescript-eslint/eslint-plugin
          fi
        working-directory: frontend

      - name: Run ESLint
        run: npx eslint "src/**/*.{ts,tsx}" --max-warnings 0
        working-directory: frontend
        continue-on-error: true  # remove once all warnings are fixed

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

  # ────────────────────────────────────────────────────────────
  # JOB 2: Test — Jest unit/integration tests
  # ────────────────────────────────────────────────────────────
  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    needs: lint

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test_root_pass
          MYSQL_DATABASE: hospital_pms_test
          MYSQL_USER: test_user
          MYSQL_PASSWORD: test_pass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -ptest_root_pass"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Run backend tests
        run: npm test --if-present
        working-directory: backend
        env:
          NODE_ENV: test
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_NAME: hospital_pms_test
          DB_USER: test_user
          DB_PASSWORD: test_pass
          ACCESS_TOKEN_SECRET: test_access_secret_64chars_minimum_length_placeholder
          REFRESH_TOKEN_SECRET: test_refresh_secret_64chars_minimum_length_placeholder

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Run frontend tests
        run: npm test --if-present -- --watchAll=false --passWithNoTests
        working-directory: frontend

  # ────────────────────────────────────────────────────────────
  # JOB 3: Docker Build & Push
  # ────────────────────────────────────────────────────────────
  build-docker:
    name: 🐳 Docker Build & Push
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    outputs:
      backend_tag: ${{ steps.meta_backend.outputs.version }}
      frontend_tag: ${{ steps.meta_frontend.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      # ── Backend ──────────────────────────────────────────────
      - name: Extract metadata for backend image
        id: meta_backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta_backend.outputs.tags }}
          labels: ${{ steps.meta_backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Frontend ─────────────────────────────────────────────
      - name: Extract metadata for frontend image
        id: meta_frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta_frontend.outputs.tags }}
          labels: ${{ steps.meta_frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ────────────────────────────────────────────────────────────
  # JOB 4: Trivy Security Scan
  # ────────────────────────────────────────────────────────────
  trivy-scan:
    name: 🔒 Trivy Security Scan
    runs-on: ubuntu-latest
    needs: build-docker
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy scan on backend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.BACKEND_IMAGE }}:latest"
          format: "sarif"
          output: "trivy-backend.sarif"
          exit-code: "0"       # don't fail build; upload results
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true

      - name: Run Trivy scan on frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.FRONTEND_IMAGE }}:latest"
          format: "sarif"
          output: "trivy-frontend.sarif"
          exit-code: "0"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true

      - name: Upload Trivy backend results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-backend.sarif"
          category: "trivy-backend"

      - name: Upload Trivy frontend results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-frontend.sarif"
          category: "trivy-frontend"

      - name: Trivy filesystem scan (source code)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "table"
          exit-code: "0"
          severity: "CRITICAL,HIGH"

  # ────────────────────────────────────────────────────────────
  # JOB 5: Slack Notification
  # ────────────────────────────────────────────────────────────
  notify-slack:
    name: 📣 Notify Slack
    runs-on: ubuntu-latest
    needs: [lint, test, build-docker, trivy-scan]
    if: always()

    steps:
      - name: Determine overall status
        id: status
        run: |
          if [[ "${{ needs.lint.result }}" == "failure" || \
                "${{ needs.test.result }}" == "failure" || \
                "${{ needs.build-docker.result }}" == "failure" || \
                "${{ needs.trivy-scan.result }}" == "failure" ]]; then
            echo "color=#FF0000" >> $GITHUB_OUTPUT
            echo "status=❌ FAILED" >> $GITHUB_OUTPUT
          else
            echo "color=#36A64F" >> $GITHUB_OUTPUT
            echo "status=✅ PASSED" >> $GITHUB_OUTPUT
          fi

      - name: Send Slack notification
        uses: slackapi/slack-github-action@v1.26.0
        continue-on-error: true
        with:
          payload: |
            {
              "attachments": [{
                "color": "${{ steps.status.outputs.color }}",
                "title": "CareSuite CI/CD — ${{ steps.status.outputs.status }}",
                "fields": [
                  { "title": "Repository", "value": "${{ github.repository }}", "short": true },
                  { "title": "Branch", "value": "${{ github.ref_name }}", "short": true },
                  { "title": "Commit", "value": "${{ github.sha }}", "short": true },
                  { "title": "Actor", "value": "${{ github.actor }}", "short": true },
                  { "title": "Lint", "value": "${{ needs.lint.result }}", "short": true },
                  { "title": "Test", "value": "${{ needs.test.result }}", "short": true },
                  { "title": "Docker Build", "value": "${{ needs.build-docker.result }}", "short": true },
                  { "title": "Trivy Scan", "value": "${{ needs.trivy-scan.result }}", "short": true }
                ],
                "footer": "GitHub Actions",
                "ts": "${{ github.event.head_commit.timestamp }}"
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

