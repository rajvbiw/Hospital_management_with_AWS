name: Deploy — EKS Kubernetes Deployment

on:
  # CI pipeline complete hone ke baad automatically trigger hoga
  workflow_run:
    workflows: ["CI/CD Pipeline — CareSuite Hospital PMS"]
    types:
      - completed
    branches: [main, master]

  # Manually bhi trigger kar sakte ho
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag to deploy (default: latest)"
        required: false
        default: "latest"
      environment:
        description: "Deployment environment"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - staging

env:
  AWS_REGION: "ap-south-1"
  EKS_CLUSTER_NAME: "hospital-mgmt"
  K8S_NAMESPACE: "hospital-system"
  BACKEND_IMAGE: ${{ secrets.DOCKER_HUB_USERNAME }}/hospital-pms-backend
  FRONTEND_IMAGE: ${{ secrets.DOCKER_HUB_USERNAME }}/hospital-pms-frontend

jobs:
  # ────────────────────────────────────────────────────────────
  # GUARD: Sirf tab deploy karo jab CI pass ho
  # ────────────────────────────────────────────────────────────
  check-ci-status:
    name: ✅ Check CI Status
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: CI passed — proceeding to deploy
        run: |
          echo "✅ CI pipeline passed. Starting deployment..."
          echo "Triggered by: ${{ github.event_name }}"
          echo "Branch: ${{ github.ref_name }}"

  # ────────────────────────────────────────────────────────────
  # JOB 1: Pre-Deploy — Image tag nikaalo
  # ────────────────────────────────────────────────────────────
  pre-deploy:
    name: 🏷️ Resolve Image Tag
    runs-on: ubuntu-latest
    needs: check-ci-status

    outputs:
      image_tag: ${{ steps.resolve_tag.outputs.tag }}

    steps:
      - name: Resolve image tag
        id: resolve_tag
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.image_tag }}"
          else
            # CI se short SHA use karo
            TAG="${{ github.event.workflow_run.head_sha }}"
            TAG="${TAG:0:7}"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "🏷️ Deploying image tag: ${TAG}"

  # ────────────────────────────────────────────────────────────
  # JOB 2: Deploy to EKS
  # ────────────────────────────────────────────────────────────
  deploy-to-eks:
    name: 🚀 Deploy to EKS
    runs-on: ubuntu-latest
    needs: pre-deploy

    environment:
      name: production
      url: ${{ steps.get_url.outputs.app_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "v1.28.0"

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER_NAME }}
          echo "✅ kubeconfig updated for cluster: ${{ env.EKS_CLUSTER_NAME }}"

      - name: Verify cluster connection
        run: |
          kubectl cluster-info
          kubectl get nodes

      # ── Namespace & Config Apply ──────────────────────────────
      - name: Apply Namespace
        run: kubectl apply -f k8s/namespace.yaml

      - name: Apply ConfigMap
        run: |
          # Query RDS endpoint dynamically using the database name
          RDS_ENDPOINT=$(aws rds describe-db-instances \
            --region ${{ env.AWS_REGION }} \
            --query "DBInstances[?DBName=='${{ secrets.MYSQL_DATABASE }}'].Endpoint.Address" \
            --output text)
          
          if [ -z "$RDS_ENDPOINT" ] || [ "$RDS_ENDPOINT" == "None" ]; then
            # Fallback check if DBName query returned empty (e.g. if db name is different or not returned)
            RDS_ENDPOINT=$(aws rds describe-db-instances \
              --region ${{ env.AWS_REGION }} \
              --query "DBInstances[0].Endpoint.Address" \
              --output text)
          fi
          
          echo "🌐 Resolved RDS Host: $RDS_ENDPOINT"

          # ConfigMap mein actual values inject karo using Python to avoid sed errors
          export MYSQL_DATABASE="${{ secrets.MYSQL_DATABASE }}"
          export MYSQL_USER="${{ secrets.MYSQL_USER }}"
          export DB_HOST="$RDS_ENDPOINT"
          
          python3 -c '
import os
filepath = "k8s/configmap.yaml"
with open(filepath, "r") as f:
    content = f.read()
content = content.replace("${MYSQL_DATABASE}", os.environ["MYSQL_DATABASE"])
content = content.replace("${MYSQL_USER}", os.environ["MYSQL_USER"])
content = content.replace("${DB_HOST}", os.environ["DB_HOST"])
with open(filepath, "w") as f:
    f.write(content)
'
          kubectl apply -f k8s/configmap.yaml


      - name: Apply Secrets
        run: |
          kubectl create secret generic hospital-secrets \
            --namespace=${{ env.K8S_NAMESPACE }} \
            --from-literal=MYSQL_ROOT_PASSWORD="${{ secrets.MYSQL_ROOT_PASSWORD }}" \
            --from-literal=MYSQL_PASSWORD="${{ secrets.MYSQL_PASSWORD }}" \
            --from-literal=DB_PASSWORD="${{ secrets.MYSQL_PASSWORD }}" \
            --from-literal=ACCESS_TOKEN_SECRET="${{ secrets.ACCESS_TOKEN_SECRET }}" \
            --from-literal=REFRESH_TOKEN_SECRET="${{ secrets.REFRESH_TOKEN_SECRET }}" \
            --dry-run=client -o yaml | kubectl apply -f -


      - name: Create Docker Hub pull secret
        run: |
          kubectl create secret docker-registry dockerhub-secret \
            --namespace=${{ env.K8S_NAMESPACE }} \
            --docker-server=https://index.docker.io/v1/ \
            --docker-username="${{ secrets.DOCKER_HUB_USERNAME }}" \
            --docker-password="${{ secrets.DOCKER_HUB_TOKEN }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      # ── Backend Deploy ────────────────────────────────────────
      - name: Update Backend image tag in manifest
        run: |
          export IMAGE_TAG="${{ needs.pre-deploy.outputs.image_tag }}"
          python3 -c '
import os
filepath = "k8s/deployment-backend.yaml"
with open(filepath, "r") as f:
    content = f.read()
target = "image: hospital_backend:latest"
replacement = f"image: {os.environ[\"BACKEND_IMAGE\"]}:{os.environ[\"IMAGE_TAG\"]}"
content = content.replace(target, replacement)
with open(filepath, "w") as f:
    f.write(content)
'
          echo "🐳 Backend image updated to ${{ env.BACKEND_IMAGE }}:${IMAGE_TAG}"

      - name: Deploy Backend to EKS
        run: |
          kubectl apply -f k8s/deployment-backend.yaml
          kubectl rollout status deployment/backend-deployment \
            --namespace=${{ env.K8S_NAMESPACE }} \
            --timeout=300s
          echo "✅ Backend deployed successfully"

      # ── Frontend Deploy ───────────────────────────────────────
      - name: Update Frontend image tag in manifest
        run: |
          export IMAGE_TAG="${{ needs.pre-deploy.outputs.image_tag }}"
          python3 -c '
import os
filepath = "k8s/deployment-frontend.yaml"
with open(filepath, "r") as f:
    content = f.read()
target = "image: hospital-frontend:latest"
replacement = f"image: {os.environ[\"FRONTEND_IMAGE\"]}:{os.environ[\"IMAGE_TAG\"]}"
content = content.replace(target, replacement)
with open(filepath, "w") as f:
    f.write(content)
'
          echo "🐳 Frontend image updated to ${{ env.FRONTEND_IMAGE }}:${IMAGE_TAG}"


      - name: Deploy Frontend to EKS
        run: |
          kubectl apply -f k8s/deployment-frontend.yaml
          kubectl rollout status deployment/hospital-frontend \
            --namespace=${{ env.K8S_NAMESPACE }} \
            --timeout=300s
          echo "✅ Frontend deployed successfully"

      # ── Get App URL ───────────────────────────────────────────
      - name: Get LoadBalancer URL
        id: get_url
        run: |
          echo "⏳ Waiting for LoadBalancer IP..."
          for i in {1..15}; do
            URL=$(kubectl get svc hospital-frontend \
              --namespace=${{ env.K8S_NAMESPACE }} \
              -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "")
            if [ -n "$URL" ]; then
              echo "app_url=http://${URL}" >> $GITHUB_OUTPUT
              echo "🌐 App URL: http://${URL}"
              break
            fi
            echo "Attempt $i/15 — waiting 10s..."
            sleep 10
          done

      # ── Deployment Summary ────────────────────────────────────
      - name: Print Deployment Summary
        run: |
          echo "### 🚀 Deployment Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Cluster** | ${{ env.EKS_CLUSTER_NAME }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Namespace** | ${{ env.K8S_NAMESPACE }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Image Tag** | ${{ needs.pre-deploy.outputs.image_tag }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Deployed by** | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **App URL** | ${{ steps.get_url.outputs.app_url }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### Pod Status" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          kubectl get pods -n ${{ env.K8S_NAMESPACE }} >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  # ────────────────────────────────────────────────────────────
  # JOB 3: Smoke Test — Deploy ke baad basic health check
  # ────────────────────────────────────────────────────────────
  smoke-test:
    name: 🧪 Smoke Test
    runs-on: ubuntu-latest
    needs: deploy-to-eks

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "v1.28.0"

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER_NAME }}

      - name: Check all pods are Running
        run: |
          echo "🔍 Checking pod health..."
          kubectl get pods -n ${{ env.K8S_NAMESPACE }} -o wide

          # Koi pod CrashLoopBackOff mein hai to fail karo
          CRASH_PODS=$(kubectl get pods -n ${{ env.K8S_NAMESPACE }} \
            --field-selector=status.phase!=Running \
            --no-headers 2>/dev/null | grep -v "Completed" | wc -l)

          if [ "$CRASH_PODS" -gt "0" ]; then
            echo "❌ Some pods are not healthy!"
            kubectl describe pods -n ${{ env.K8S_NAMESPACE }}
            exit 1
          fi
          echo "✅ All pods are healthy!"

      - name: Backend health check via kubectl port-forward
        run: |
          # Backend pod ka naam lo
          BACKEND_POD=$(kubectl get pods -n ${{ env.K8S_NAMESPACE }} \
            -l app=backend \
            -o jsonpath='{.items[0].metadata.name}')

          echo "Testing backend pod: $BACKEND_POD"

          # Background mein port-forward karo
          kubectl port-forward pod/$BACKEND_POD 5000:5000 \
            -n ${{ env.K8S_NAMESPACE }} &
          PF_PID=$!
          sleep 5

          # Health endpoint hit karo
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            http://localhost:5000/health || echo "000")

          kill $PF_PID 2>/dev/null

          if [ "$HTTP_STATUS" == "200" ]; then
            echo "✅ Backend health check passed (HTTP $HTTP_STATUS)"
          else
            echo "⚠️ Backend returned HTTP $HTTP_STATUS (may be acceptable)"
          fi

  # ────────────────────────────────────────────────────────────
  # JOB 4: Notify Slack — Deploy result
  # ────────────────────────────────────────────────────────────
  notify-deploy:
    name: 📣 Notify Deploy Status
    runs-on: ubuntu-latest
    needs: [deploy-to-eks, smoke-test]
    if: always()

    steps:
      - name: Determine deploy status
        id: status
        run: |
          if [[ "${{ needs.deploy-to-eks.result }}" == "success" && \
                "${{ needs.smoke-test.result }}" == "success" ]]; then
            echo "color=#36A64F" >> $GITHUB_OUTPUT
            echo "status=✅ DEPLOYED SUCCESSFULLY" >> $GITHUB_OUTPUT
            echo "emoji=🚀" >> $GITHUB_OUTPUT
          else
            echo "color=#FF0000" >> $GITHUB_OUTPUT
            echo "status=❌ DEPLOY FAILED" >> $GITHUB_OUTPUT
            echo "emoji=🔥" >> $GITHUB_OUTPUT
          fi

      - name: Send Slack notification
        uses: slackapi/slack-github-action@v1.26.0
        continue-on-error: true
        with:
          payload: |
            {
              "attachments": [{
                "color": "${{ steps.status.outputs.color }}",
                "title": "${{ steps.status.outputs.emoji }} CareSuite Deploy — ${{ steps.status.outputs.status }}",
                "fields": [
                  { "title": "Cluster", "value": "${{ env.EKS_CLUSTER_NAME }}", "short": true },
                  { "title": "Image Tag", "value": "${{ needs.pre-deploy.outputs.image_tag }}", "short": true },
                  { "title": "Deploy", "value": "${{ needs.deploy-to-eks.result }}", "short": true },
                  { "title": "Smoke Test", "value": "${{ needs.smoke-test.result }}", "short": true },
                  { "title": "Actor", "value": "${{ github.actor }}", "short": true },
                  { "title": "Branch", "value": "${{ github.ref_name }}", "short": true }
                ],
                "footer": "GitHub Actions — EKS Deploy"
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

